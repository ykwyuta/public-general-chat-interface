id: task-marketing
name: "タスクエージェント：マーケティング担当"
description: "タスク機能検証用のマーケティングエージェント応答スクリプト"
category: task

turns:
  - match: ".*競合.*|.*市場.*|.*ポジショニング.*"
    steps:
      - type: text
        text: |
          競合分析の観点からコメントします。

          **市場ポジショニング**
          - 既存製品との差別化ポイントを明確にする必要があります
          - ターゲット層は30〜40代のビジネスユーザーが最適と考えます
          - 価格帯は競合他社より10〜15%低めに設定することで市場参入を加速できます

          リリース前に競合他社の動向を再確認し、差別化戦略を固めることをお勧めします。

  - match: ".*承認.*|.*よろしい.*|.*問題ない.*"
    steps:
      - type: text
        text: |
          マーケティング観点から承認します。

          訴求ポイントと価格戦略については合意しました。@tech のリリーススケジュール確認後、正式なGoサインを出せます。

  - match: ".*"
    steps:
      - type: text
        text: |
          マーケティング観点からの見解をお伝えします。

          製品の強みを前面に出したメッセージングと、段階的なリリース戦略を推奨します。まず既存顧客へのアーリーアクセスから始め、フィードバックをもとに一般公開することで市場リスクを最小化できます。

          詳細な訴求ポイントについては @tech との技術的な実現可能性確認も必要です。
