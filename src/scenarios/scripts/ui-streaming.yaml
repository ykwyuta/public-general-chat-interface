id: ui-streaming
name: "UI確認：ストリーミング表示"
description: "テキストが逐次ストリーミング表示される様子を確認します"
category: ui

turns:
  - match: ".*"
    steps:
      - type: text
        text: |
          これはストリーミング表示のテストです。

          テキストが文字単位で少しずつ表示されていく様子を確認してください。長い段落を含むことで、スクロール動作やリアルタイム更新の挙動を検証できます。

          ## ストリーミングの検証ポイント

          - テキストが途切れず連続して表示されること
          - スクロールが自動的に末尾に追従すること
          - 送信ボタンがストリーミング中は無効化されること
          - ストリーミング完了後にメッセージが確定表示されること

          以上の4点が正常に動作していれば、ストリーミング機能は正常です。
