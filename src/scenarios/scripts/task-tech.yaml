id: task-tech
name: "タスクエージェント：技術担当"
description: "タスク機能検証用の技術エージェント応答スクリプト"
category: task

turns:
  - match: ".*工数.*|.*スケジュール.*|.*期間.*"
    steps:
      - type: text
        text: |
          技術面の工数見積もりをお伝えします。

          **工数見積もり**
          | 項目 | 見積もり |
          |------|---------|
          | バックエンド実装 | 3週間 |
          | フロントエンド実装 | 2週間 |
          | テスト・品質保証 | 1週間 |
          | インフラ構築 | 3日 |
          | **合計** | **約6.5週間** |

          来月リリースはスケジュールとして**タイトです**。優先機能の絞り込みを検討してください。

  - match: ".*承認.*|.*よろしい.*|.*問題ない.*"
    steps:
      - type: text
        text: |
          技術観点から承認します。

          コア機能に絞ったスコープであればリリース可能と判断します。@marketing が提示した訴求ポイントをすべて満たせる見込みです。

  - match: ".*"
    steps:
      - type: text
        text: |
          技術的な観点から状況を確認しました。

          現状の実装では主要機能の提供は可能ですが、パフォーマンス最適化はリリース後の対応になります。セキュリティ要件については追加レビューが必要な箇所があるため、リリース前に確認をお願いします。

          @marketing と優先機能のスコープを合意した後、詳細な技術仕様を共有します。
